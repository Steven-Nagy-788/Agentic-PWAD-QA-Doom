services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-doom_agentic_qa}"
      POSTGRES_USER: "${POSTGRES_USER:-doom_agentic}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doom_agentic} -d ${POSTGRES_DB:-doom_agentic_qa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-doom:
    build:
      context: ./mcp-doom
      dockerfile: Dockerfile
    environment:
      DISPLAY: ":99"
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - wad_storage:/app/storage/wads
    command: >
      bash -c "Xvfb :99 -screen 0 1024x768x24 &
               sleep 1 &&
               fastmcp run src/doom_mcp/server.py --transport sse --host 0.0.0.0 --port 8001 --path /sse"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1', 8001), 2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-doom_agentic}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-doom_agentic_qa}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-gemma-4-31b-it}"
      LLM_REPORT_MODEL: "${LLM_REPORT_MODEL:-gemini-3.5-flash}"
      LLM_THROTTLE_SECONDS: "${LLM_THROTTLE_SECONDS:-4}"
      MCP_DOOM_SSE_URL: "http://mcp-doom:8001/sse"
      STORAGE_DIR: "/app/storage"
      WAD_STORAGE_DIR: "/app/storage/wads"
      REPORT_STORAGE_DIR: "/app/storage/reports"
      RECORDING_STORAGE_DIR: "/app/storage/recordings"
      SCREENSHOT_STORAGE_DIR: "/app/storage/screenshots"
      ANALYSIS_STORAGE_DIR: "/app/storage/analysis"
      IWAD_USED: "${IWAD_USED:-freedoom2}"
      MAX_RUN_TICKS: "${MAX_RUN_TICKS:-35000}"
      DEFAULT_RUN_TICKS: "${DEFAULT_RUN_TICKS:-3000}"
      LIVE_FRAME_FPS: "${LIVE_FRAME_FPS:-35}"
      RECORDING_TELEMETRY_STRIDE: "${RECORDING_TELEMETRY_STRIDE:-1}"
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - wad_storage:/app/storage/wads
      - recording_storage:/app/storage/recordings
      - report_storage:/app/storage/reports
      - screenshot_storage:/app/storage/screenshots
      - analysis_storage:/app/storage/analysis
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mcp-doom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=2)\""]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8000/v1"
        NEXT_PUBLIC_WS_BASE: "ws://localhost:8000/v1"
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000/v1"
      NEXT_PUBLIC_WS_BASE: "ws://localhost:8000/v1"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  wad_storage:
  recording_storage:
  report_storage:
  screenshot_storage:
  analysis_storage:
