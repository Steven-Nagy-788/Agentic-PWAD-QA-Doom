name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Backend/requirements.txt
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libgdk-pixbuf-2.0-0
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
      - name: Run backend tests
        run: ./.venv/bin/python -m pytest -q

  mcp-doom:
    name: MCP Doom tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-doom
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mcp-doom/pyproject.toml
      - name: Install ViZDoom runtime packages
        run: sudo apt-get update && sudo apt-get install -y libgl1 libsdl2-2.0-0
      - name: Install MCP package
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -e ".[dev]"
      - name: Run MCP tests
        run: ./.venv/bin/python -m pytest -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --run
      - name: Run lint
        run: npm run lint
      - name: Build frontend
        run: npm run build
