name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: doom_qa
          POSTGRES_USER: doom_qa
          POSTGRES_PASSWORD: doom_qa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doom_qa -d doom_qa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: Backend
    env:
      DATABASE_URL: postgresql+asyncpg://doom_qa:doom_qa@127.0.0.1:5432/doom_qa
      STORAGE_DIR: storage
      GEMINI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Backend/requirements.txt
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libgdk-pixbuf-2.0-0
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt
          ./.venv/bin/pip install ruff
      - name: Lint with ruff
        run: ./.venv/bin/ruff check app/
      - name: Check formatting with ruff
        run: ./.venv/bin/ruff format --check app/
      - name: Run backend tests
        run: ./.venv/bin/python -m pytest -q
      - name: Verify Alembic migrations on fresh PostgreSQL
        run: |
          ./.venv/bin/alembic upgrade head
          ./.venv/bin/alembic current
          ./.venv/bin/alembic check

  mcp-doom:
    name: MCP Doom unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-doom
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mcp-doom/pyproject.toml
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -e ".[dev]"
          ./.venv/bin/pip install ruff
      - name: Lint with ruff
        run: ./.venv/bin/ruff check src/
      - name: Run MCP unit tests
        run: ./.venv/bin/python -m pytest -q -m "not integration"

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Install frontend dependencies
        run: bun ci
      - name: Type check
        run: bunx tsc --noEmit
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
      - name: Run frontend tests
        run: bun run test
      - name: Run lint
        run: bun run lint
      - name: Build frontend
        run: bun run build
      - name: Run browser layout tests
        env:
          PLAYWRIGHT_WEB_SERVER_COMMAND: bun run start --hostname 127.0.0.1 --port 3100
        run: bun run test:e2e

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: [backend, mcp-doom, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: false
          tags: doom-qa-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build MCP Doom image
        uses: docker/build-push-action@v6
        with:
          context: ./mcp-doom
          push: false
          tags: doom-qa-mcp
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: doom-qa-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max
