name: Full Product E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

concurrency:
  group: full-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-e2e:
    name: Docker Compose full-stack smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      POSTGRES_PASSWORD: doom_qa_ci
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            docker compose ps
            sleep 2
          done
          docker compose logs --no-color
          exit 1

      - name: Run dependency smoke check
        run: curl -fsS http://127.0.0.1:8000/health/smoke | tee health-smoke.json

      - name: Generate uploadable PWAD fixture from bundled Freedoom
        run: |
          docker compose cp scripts/extract_iwad_map.py mcp-doom:/tmp/extract_iwad_map.py
          docker compose exec -T mcp-doom python /tmp/extract_iwad_map.py freedoom2 MAP01 /tmp/ci-map.wad
          docker compose cp mcp-doom:/tmp/ci-map.wad ./ci-map.wad

      - name: Start short deterministic run and verify artifacts
        run: |
          set -euo pipefail
          WAD_JSON="$(curl -fsS -F "file=@ci-map.wad;filename=ci-map.wad" http://127.0.0.1:8000/v1/wads/upload)"
          echo "$WAD_JSON" > wad-upload.json
          WAD_ID="$(jq -r '.id' wad-upload.json)"
          RUN_JSON="$(curl -fsS -H 'Content-Type: application/json' \
            -d "{\"wad_file_id\":\"$WAD_ID\",\"map_name\":\"MAP01\",\"difficulty_level\":3,\"max_ticks\":180,\"behavior_profile\":\"fast\",\"seed\":42}" \
            http://127.0.0.1:8000/v1/runs)"
          echo "$RUN_JSON" > run-create.json
          RUN_ID="$(jq -r '.id' run-create.json)"
          for attempt in {1..120}; do
            curl -fsS "http://127.0.0.1:8000/v1/runs/$RUN_ID" > run-final.json
            STATUS="$(jq -r '.status' run-final.json)"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ] || [ "$STATUS" = "cancelled" ]; then
              break
            fi
            sleep 2
          done
          STATUS="$(jq -r '.status' run-final.json)"
          test "$STATUS" = "completed" || test "$STATUS" = "failed"
          for attempt in {1..60}; do
            curl -fsS "http://127.0.0.1:8000/v1/runs/$RUN_ID/report/status" > report-status.json
            PDF_AVAILABLE="$(jq -r '.pdf_available // false' report-status.json)"
            if [ "$PDF_AVAILABLE" = "true" ]; then
              break
            fi
            sleep 2
          done
          test "$(jq -r '.pdf_available // false' report-status.json)" = "true"
          curl -fsS "http://127.0.0.1:8000/v1/runs/$RUN_ID/report/pdf" -o report.pdf
          test -s report.pdf
          curl -fsS "http://127.0.0.1:8000/v1/runs/$RUN_ID/recording" -o recording.mp4
          test -s recording.mp4

      - name: Capture compose logs
        if: always()
        run: docker compose logs --no-color > e2e-compose.log

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-artifacts
          path: |
            health-smoke.json
            wad-upload.json
            run-create.json
            run-final.json
            report-status.json
            report.pdf
            recording.mp4
            e2e-compose.log
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: docker compose down -v
